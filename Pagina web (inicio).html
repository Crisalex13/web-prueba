<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audio studio - Tienda</title>
  <link href="Estilos/Pagina web.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <!-- menu sidebar vertical flotante con efecto curva mágica-->
  
<div class="sidebar">
    <ul class="menu">
        <li><i class="fas fa-home"></i><span>Inicio</span></li>
        <li><i class="fas fa-user"></i><span>Perfil</span></li>
        <li><i class="fas fa-cog"></i><span>Configuración</span></li>
        <li><i class="fas fa-envelope"></i><span>Mensajes</span></li>
    </ul>
</div>

  <div class="header-inner">
    <img class="logoleon" src="Imagenes/audio studio.png" alt="Logo Audio Studio">
    <div class="logo">Audio<span>Studio</span></div>
    <nav class="nav">
      <a href="#" class="nav-link active" data-view="catalog">Catalogo</a>
      <a href="#" class="nav-link" data-view="add" id="navAgregar">Agregar</a>
    </nav>
    <div class="hright">
      <div class="user-info">
        <i class="fas fa-circle-user"></i>
        <span id="userName"></span>
        <span id="roleBadge" class="badge"></span>
      </div>
      <button class="btn-logout" id="btnLogout">
        <i class="fas fa-right-from-bracket"></i> Salir
      </button>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <p class="hero-label">Coleccion 2026</p>
    <h1 class="hero-title">Descubre<br/>nuestros<br/><em>productos</em></h1>
  </div>
  <div class="hero-deco"></div>
</section>

<!-- TOOLBAR -->
<section class="toolbar">
  <div class="search-wrap">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Buscar producto..." />
  </div>
  <div class="filter-wrap">
    <select id="catFilter">
      <option value="">Todas las categorias</option>
      <option>Electronica</option><option>Ropa</option><option>Hogar</option>
      <option>Deportes</option><option>Alimentos</option><option>Otro</option>
    </select>
  </div>
</section>

<!-- MAIN -->
<main class="main">

  <!-- CATALOGO -->
  <div id="catalogView" class="view active">
    <div id="grid" class="grid"></div>
    <div id="emptyState" class="empty hidden">
      <i class="fas fa-box-open"></i>
      <p>No hay productos.</p>
      <button class="btn btn-primary" onclick="goAdd()">Agregar producto</button>
    </div>
  </div>

  <!-- AGREGAR / EDITAR -->
  <div id="addView" class="view">
    <div class="form-card">
      <h2 id="formTitle">Agregar Producto</h2>
      <form id="productForm" novalidate>
        <input type="hidden" id="editId" />
        <div class="form-row">
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="fName" placeholder="Ej: iPhone 15 Pro" />
          </div>
          <div class="form-group">
            <label>Categoria *</label>
            <select id="fCat">
              <option value="">Seleccionar...</option>
              <option>Electronica</option><option>Ropa</option><option>Hogar</option>
              <option>Deportes</option><option>Alimentos</option><option>Otro</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Precio (MXN) *</label>
            <input type="number" id="fPrice" placeholder="0.00" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label>Stock *</label>
            <input type="number" id="fStock" placeholder="0" min="0" />
          </div>
        </div>
        <div class="form-group full">
          <label>Descripcion *</label>
          <textarea id="fDesc" rows="4" placeholder="Describe el producto..."></textarea>
        </div>
        <div class="form-group full">
          <label>URL de Imagen</label>
          <input type="url" id="fImg" placeholder="https://..." />
        </div>
        <div class="form-group full">
          <label>SKU / Codigo</label>
          <input type="text" id="fSku" placeholder="SKU-001" />
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="cancelForm()">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">
            <i class="fas fa-plus"></i> Agregar Producto
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- DETALLE -->
  <div id="detailView" class="view">
    <button class="back-btn" onclick="showView('catalog')"><i class="fas fa-arrow-left"></i> Volver</button>
    <div id="detailContent"></div>
  </div>

</main>

<!-- MODAL ELIMINAR -->
<div id="modalDel" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-icon"><i class="fas fa-triangle-exclamation"></i></div>
    <h3>Eliminar producto?</h3>
    <p>Esta accion no se puede deshacer.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" id="btnConfirmDel">Si, eliminar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="Comportamientos/pagina web.js"></script>
</body>
</html>
